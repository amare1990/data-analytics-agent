kind: sources
name: postgres_main
type: postgres
host: postgres
port: 5432
database: oracle_forge
user: oracle_forge
password: oracle_forge
---
kind: sources
name: sqlite_main
type: sqlite
database: ${SQLITE_PATH}
---
kind: sources
name: mongo_main
type: mongodb
uri: ${MONGODB_URL}
---
kind: tools
name: query_postgresql
type: postgres-execute-sql
source: postgres_main
description: Execute SQL against PostgreSQL.
---
kind: tools
name: query_sqlite
type: sqlite-execute-sql
source: sqlite_main
description: Execute SQL against SQLite.
---
kind: tools
name: query_mongodb
type: mongodb-aggregate
source: mongo_main
description: Execute aggregation pipeline against MongoDB.
database: ${MONGODB_DB}
collection: "{{.collection}}"
pipelinePayload: "{{.pipeline}}"
pipelineParams:
  - name: collection
    type: string
    description: Collection name to query.
  - name: pipeline
    type: string
    description: JSON array string of aggregation stages.
